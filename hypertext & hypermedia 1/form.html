<!DOCTYPE html>
<html>
<body>
<h1><center>Contact Form</center></h1>
<form>
  <label for="fname">Your name<span style="color: tomato">*</span>: </label>
    <input type="text" id="fname" name="fname" required><br>
  <label for="email">Enter your email address<span style="color: tomato">*</span>: </label>
    <input type="email" id="email" name="email" required><br>
  <label for="reason">Reason for contact (multiple-choice):</label><br>
      <input type="checkbox" id="error" name="reason" value="error">
      <label for="error">visual error on website</label><br>
      <input type="checkbox" id="spell" name="reason" value="spelling">
      <label for="spell">spelling error in text</label><br>
      <input type="checkbox" id="other" name="reason" value="other">
      <label for="other">other</label>
      <label for="othertext">
      <small><i>(please specify below)</i></small></label><br>
  <select name="othertext" id="othertext">
         <option value="">None</option>
         <option value="different error or mistake on website">different error or mistake on website</option>
         <option value="issue with links or resources">issue with links or resources</option>
         <option value="images not loading">images not loading</option>
         <option value="mobile version not working">broken site on mobile view</option>
  </select><br>
  <h3><center>Ignoring the issue specified above, please let me know how you'd rate your experience on my website.</center></h3>
  <label for="scale">How do you rate the aesthetic aspect of the website?<span style="color: tomato">*</span> (on a scale 1-10):</label>
  <input type="number" id="scale" name="scale" min="1" max="10" required><br>
  <label for="scale2">How do you rate the usability of the website?<span style="color: tomato">*</span> (on a scale 1-10):</label>
  <input type="number" id="scale2" name="scale2" min="1" max="10" required><br>
  <label for="rate">Overall, how was your experience?<span style="color: tomato">*</span> (0-5)</label><br>
      <label for="rate">Bad</label>
      <input type="range" id="rate" name="rate" min="0" max="5">
      <label for="rate">Good</label>
  <br><br>
  <input type="submit" value="Submit">
  <input type="reset" value="Reset">
</form>
<h3>Thank you for your time!</h3>
<p>An email responding to your form should appear in your inbox within a week.</p>
</body>
</html>
